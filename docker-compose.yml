services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: personaai
      POSTGRES_PASSWORD: personaai
      POSTGRES_DB: personaai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      - db

volumes:
  postgres_data:
